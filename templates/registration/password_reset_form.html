{% extends 'services/base.html' %}

{% block title %}بازیابی رمز عبور | آگاه‌یار{% endblock %}

{% block content %}
<style>
.reset-container {
    max-width: 450px;
    margin: 50px auto;
    background: white;
    padding: 40px;
    border-radius: 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    text-align: center;
}
.reset-container h2 {
    color: #1a5f7a;
    margin-bottom: 20px;
}
.form-group {
    margin-bottom: 20px;
    text-align: right;
}
.form-group input {
    width: 100%;
    padding: 14px;
    border: 1px solid #e0e0e0;
    border-radius: 16px;
    font-size: 1rem;
}
.btn-reset {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1a5f7a, #2c8faa);
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
}
</style>

<div class="reset-container">
    <h2>🔑 بازیابی رمز عبور</h2>
    <p style="color:#6c757d;">ایمیل خود را وارد کنید تا لینک بازیابی برای شما ارسال شود.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>آدرس ایمیل</label>
            <input type="email" name="email" placeholder="example@email.com" required>
        </div>
        <button type="submit" class="btn-reset">📩 ارسال لینک بازیابی</button>
    </form>
    
    <div style="margin-top: 20px;">
        <a href="{% url 'login' %}" style="color:#1a5f7a;">← بازگشت به صفحه ورود</a>
    </div>
</div>
{% endblock %}
