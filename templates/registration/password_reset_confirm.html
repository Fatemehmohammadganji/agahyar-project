{% extends 'services/base.html' %}

{% block title %}تنظیم رمز جدید | آگاه‌یار{% endblock %}

{% block content %}
<style>
.reset-container {
    max-width: 450px;
    margin: 50px auto;
    background: white;
    padding: 40px;
    border-radius: 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
}
.reset-container h2 {
    color: #1a5f7a;
    text-align: center;
    margin-bottom: 20px;
}
.form-group {
    margin-bottom: 20px;
}
.form-group input {
    width: 100%;
    padding: 14px;
    border: 1px solid #e0e0e0;
    border-radius: 16px;
    font-size: 1rem;
}
.btn-reset {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1a5f7a, #2c8faa);
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
}
</style>

<div class="reset-container">
    <h2>🔐 تنظیم رمز عبور جدید</h2>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>رمز عبور جدید</label>
            <input type="password" name="new_password1" placeholder="رمز جدید را وارد کنید" required>
        </div>
        <div class="form-group">
            <label>تکرار رمز عبور جدید</label>
            <input type="password" name="new_password2" placeholder="رمز جدید را دوباره وارد کنید" required>
        </div>
        <button type="submit" class="btn-reset">✅ تغییر رمز عبور</button>
    </form>
</div>
{% endblock %}
